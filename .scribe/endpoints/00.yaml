name: 'Monitored URLs'
description: |-

  Endpoints for registering and listing monitored URLs.
endpoints:
  -
    custom: []
    httpMethods:
      - GET
    uri: api/monitors
    metadata:
      custom: []
      groupName: 'Monitored URLs'
      groupDescription: |-

        Endpoints for registering and listing monitored URLs.
      subgroup: ''
      subgroupDescription: ''
      title: 'List all monitored urls'
      description: |-
        Returns all registered monitors with their current status,
        last checked time, and uptime percentage.
      authenticated: false
      deprecated: false
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters: []
    cleanBodyParameters: []
    fileParameters: []
    responses:
      -
        custom: []
        status: 200
        content: |-
          {
            "data": [
              {
                "id": 1,
                "url": "https://example.com",
                "check_interval": 5,
                "threshold": 3,
                "status": "up",
                "last_checked_at": "2026-05-13T10:05:00.000000Z",
                "uptime_percentage": 99.5,
                "created_at": "2026-05-13T10:00:00.000000Z"
              }
            ]
          }
        headers: []
        description: Success
    responseFields: []
    auth: []
    controller: null
    method: null
    route: null
  -
    custom: []
    httpMethods:
      - POST
    uri: api/monitors
    metadata:
      custom: []
      groupName: 'Monitored URLs'
      groupDescription: |-

        Endpoints for registering and listing monitored URLs.
      subgroup: ''
      subgroupDescription: ''
      title: 'Register a url'
      description: |-
        Add a new URL to monitor. The system will begin checking it
        on the next scheduler run based on the check_interval.
        Status will be "pending" until the first check runs.
      authenticated: false
      deprecated: false
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters:
      url:
        custom: []
        name: url
        description: 'Must be a valid URL. Must not be greater than 2048 characters.'
        required: true
        example: 'http://www.bailey.biz/quos-velit-et-fugiat-sunt-nihil-accusantium-harum.html'
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
      check_interval:
        custom: []
        name: check_interval
        description: 'Must be at least 1. Must not be greater than 60.'
        required: false
        example: 5
        type: integer
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
      threshold:
        custom: []
        name: threshold
        description: 'Must be at least 1.'
        required: false
        example: 23
        type: integer
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
    cleanBodyParameters:
      url: 'http://www.bailey.biz/quos-velit-et-fugiat-sunt-nihil-accusantium-harum.html'
      check_interval: 5
      threshold: 23
    fileParameters: []
    responses:
      -
        custom: []
        status: 201
        content: |-
          {
            "data": {
              "id": 1,
              "url": "https://example.com",
              "check_interval": 5,
              "threshold": 3,
              "status": "pending",
              "last_checked_at": null,
              "uptime_percentage": null,
              "created_at": "2026-05-13T10:00:00.000000Z"
            }
          }
        headers: []
        description: Created
      -
        custom: []
        status: 422
        content: |-
          {
            "message": "The url field is required.",
            "errors": {
              "url": ["The url field is required."]
            }
          }
        headers: []
        description: 'Validation error'
      -
        custom: []
        status: 422
        content: |-
          {
            "message": "This URL is already being monitored.",
            "errors": {
              "url": ["This URL is already being monitored."]
            }
          }
        headers: []
        description: 'Duplicate URL'
    responseFields: []
    auth: []
    controller: null
    method: null
    route: null
