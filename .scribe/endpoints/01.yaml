name: 'Monitor History'
description: |-

  Endpoints for browsing the check history of a monitored URL.
endpoints:
  -
    custom: []
    httpMethods:
      - GET
    uri: 'api/monitors/{id}/history'
    metadata:
      custom: []
      groupName: 'Monitor History'
      groupDescription: |-

        Endpoints for browsing the check history of a monitored URL.
      subgroup: ''
      subgroupDescription: ''
      title: 'Get check history'
      description: |-
        Returns a paginated list of all checks run against a monitor,
        ordered by most recent first. Each check records the HTTP status
        code, response time, and whether the site was considered up.

        A check is considered up if the status code is 2xx or 3xx.
        If the request timed out or failed to connect, status_code will
        be 0 and response_time_ms will be null.
      authenticated: false
      deprecated: false
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters:
      id:
        custom: []
        name: id
        description: 'The ID of the monitor.'
        required: true
        example: 1
        type: integer
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
    cleanUrlParameters:
      id: 1
    queryParameters:
      page:
        custom: []
        name: page
        description: 'Page number. Defaults to 1.'
        required: false
        example: 1
        type: integer
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      per_page:
        custom: []
        name: per_page
        description: 'Number of results per page. Maximum 100. Defaults to 15.'
        required: false
        example: 15
        type: integer
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
    cleanQueryParameters:
      page: 1
      per_page: 15
    bodyParameters: []
    cleanBodyParameters: []
    fileParameters: []
    responses:
      -
        custom: []
        status: 200
        content: |-
          {
            "data": [
              {
                "id": 1,
                "monitor_id": 1,
                "status_code": 200,
                "response_time_ms": 245,
                "is_up": true,
                "checked_at": "2026-05-13T10:05:00.000000Z"
              },
              {
                "id": 2,
                "monitor_id": 1,
                "status_code": 0,
                "response_time_ms": null,
                "is_up": false,
                "checked_at": "2026-05-13T10:10:00.000000Z"
              }
            ],
            "meta": {
              "current_page": 1,
              "per_page": 15,
              "total": 50
            }
          }
        headers: []
        description: Success
      -
        custom: []
        status: 404
        content: |-
          {
            "message": "Monitor not found."
          }
        headers: []
        description: 'Monitor not found'
    responseFields: []
    auth: []
    controller: null
    method: null
    route: null
